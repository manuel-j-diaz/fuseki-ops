services:
  fuseki:
    ## In-memory dataset (default, data lost on stop):
    command: [ "--ui", "/fuseki/webapp", "--mem", "/ds" ]
    ## Persistent TDB2 dataset (uncomment to use, comment out the line above):
    ## command: [ "--ui", "/fuseki/webapp", "--tdb2", "--update", "--loc", "databases/DB2", "/ds" ]
    build:
      context: .
      dockerfile: Dockerfile
    image: fuseki
    environment:
      - FUSEKI_ADMIN_USER=${FUSEKI_ADMIN_USER:-admin}
      - FUSEKI_ADMIN_PASSWORD=${FUSEKI_ADMIN_PASSWORD:-password}
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://$$FUSEKI_ADMIN_USER:$$FUSEKI_ADMIN_PASSWORD@localhost:3030/$$/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/fuseki/logs
      - ./databases:/fuseki/databases
    networks:
      - fuseki-net
      - semantic-web

networks:
  fuseki-net:
    driver: bridge
  semantic-web:
    external: true
    name: ${DOCKER_NETWORK:-semantic-web}
    internal: true
