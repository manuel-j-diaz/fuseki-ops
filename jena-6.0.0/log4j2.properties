status = error
name = JenaLogging

## Log to SYSTEM_ERR so CLI tool output on SYSTEM_OUT is not polluted.
appender.console.type = Console
appender.console.name = OUT
appender.console.target = SYSTEM_ERR
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{HH:mm:ss}] %-5p %-15c{1} :: %m%n

rootLogger.level                  = WARN
rootLogger.appenderRef.stdout.ref = OUT

logger.jena.name  = org.apache.jena
logger.jena.level = WARN

## Show query execution info (timing, row counts).
logger.arq-exec.name  = org.apache.jena.arq.exec
logger.arq-exec.level = INFO

logger.riot.name  = org.apache.jena.riot
logger.riot.level = WARN
